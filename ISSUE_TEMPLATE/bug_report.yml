name: Bug report
description: Report a reproducible problem with the INVESTEGATE custom firmware.
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug.

        Please only use this form for reproducible problems with the INVESTEGATE custom firmware.
        Before submitting, make sure you are using the latest release and include the requested printer information.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-checks
      options:
        - label: I am using an INVESTEGATE custom firmware release, not stock Prusa firmware.
          required: true
        - label: I have checked the latest release notes.
          required: true
        - label: I understand this is unofficial custom firmware.
          required: true

  - type: input
    id: firmware-version
    attributes:
      label: Firmware version / file
      description: Example: mk3.5_firmware_6.5.3_MODv1.0.bbf
      placeholder: mk3.5_firmware_6.5.3_MODv1.0.bbf
    validations:
      required: true

  - type: dropdown
    id: printer-model
    attributes:
      label: Printer model
      options:
        - Original Prusa MK3.5
        - Original Prusa MK3.5S
        - Other / unsure
    validations:
      required: true

  - type: input
    id: extruder-hotend
    attributes:
      label: Extruder / hotend setup
      description: Example: Bondtech LGX Shortcut, stock hotend, Mosquito, Revo, etc.
      placeholder: Bondtech LGX Shortcut
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem description
      description: What happened?
      placeholder: Describe the problem clearly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List exact steps so the issue can be reproduced.
      placeholder: |
        1. Open ...
        2. Set ...
        3. Start ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: m503
    attributes:
      label: Relevant M503 output
      description: Paste relevant M503 output. At minimum include M851, M92, M906 and M603 if available.
      render: text
      placeholder: |
        M851 ...
        M92 ...
        M906 ...
        M603 ...
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs, terminal output, photos or videos
      description: Add serial output, PrusaLink/Connect messages, screenshots, photos or videos if helpful.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that may help.
    validations:
      required: false
