name: Hardware compatibility request
description: Request support for another extruder, hotend, heater, thermistor or hardware setup.
title: "[HARDWARE] "
labels: ["hardware", "compatibility", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for hardware compatibility requests.

        Important: The maintainer currently tests mainly with a Bondtech LGX Shortcut setup.
        Additional hardware support should be developed and tested together with users or developers who own the required hardware.

  - type: dropdown
    id: hardware-type
    attributes:
      label: Hardware type
      options:
        - Extruder
        - Hotend
        - Heater
        - Thermistor
        - Heatbed sensor / thermistor
        - Motion / stepper related
        - Other
    validations:
      required: true

  - type: input
    id: hardware-name
    attributes:
      label: Exact hardware name
      description: Include manufacturer and exact model if possible.
      placeholder: Bondtech LGX Shortcut, Mosquito, Revo, ...
    validations:
      required: true

  - type: dropdown
    id: printer-model
    attributes:
      label: Printer model
      options:
        - Original Prusa MK3.5
        - Original Prusa MK3.5S
        - Other / unsure
    validations:
      required: true

  - type: textarea
    id: documentation
    attributes:
      label: Documentation / technical data
      description: Add links or data sheets for the hardware.
      placeholder: Paste links to official documentation, resistance tables, current recommendations, steps/mm recommendations, etc.
    validations:
      required: false

  - type: textarea
    id: requested-support
    attributes:
      label: What support is needed?
      description: Describe what the firmware should support or expose in the menu.
      placeholder: Example: preset profile, current setting, thermistor table, heater limit, E-step integration, etc.
    validations:
      required: true

  - type: textarea
    id: testing
    attributes:
      label: Testing availability
      description: Can you test this on real hardware? What exactly can you verify?
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Known risks or safety notes
      description: Especially important for heaters, thermistors, currents and motion limits.
    validations:
      required: false
